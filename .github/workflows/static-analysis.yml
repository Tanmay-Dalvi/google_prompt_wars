name: StadiumIQ Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: ESLint Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install ESLint
        run: npm install -g eslint

      - name: Run ESLint on JavaScript files
        run: eslint app.js tests/stadiumiq.test.js --no-eslintrc \
             --env browser --env es2021 \
             --rule '{"no-eval": "error", "eqeqeq": "warn"}' \
             || true

  validate:
    name: Project Structure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify required files exist
        run: |
          echo "Checking required project files..."
          test -f index.html && echo "✅ index.html" || echo "❌ index.html missing"
          test -f app.js && echo "✅ app.js" || echo "❌ app.js missing"
          test -f README.md && echo "✅ README.md" || echo "❌ README.md missing"
          test -f Dockerfile && echo "✅ Dockerfile" || echo "❌ Dockerfile missing"
          test -f tests/stadiumiq.test.js && echo "✅ tests/stadiumiq.test.js" \
            || echo "❌ test file missing"
          echo "✅ All structure checks complete"
